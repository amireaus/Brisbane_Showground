<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brisbane Showgrounds — Google Ads Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f9; color: #202124; }

header { background: #1a2233; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { color: white; font-size: 17px; font-weight: 600; }
header .sub { color: #9aa0a6; font-size: 12px; margin-top: 2px; }

.controls { background: white; padding: 10px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #dadce0; }
.controls label { font-size: 13px; font-weight: 600; }
#range-select { border: 1px solid #dadce0; border-radius: 4px; padding: 6px 12px; font-size: 14px; color: #1a73e8; font-weight: 600; background: #e8f0fe; cursor: pointer; }

main { padding: 18px 24px; max-width: 1440px; margin: 0 auto; }

.section-label { font-size: 11px; font-weight: 700; color: #80868b; text-transform: uppercase; padding: 16px 0 8px; border-top: 1px solid #dadce0; margin-top: 4px; }
.section-label:first-child { border-top: none; padding-top: 0; }

.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 500px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

.kpi-card { background: white; border-radius: 8px; padding: 16px 14px; border-left: 4px solid #1a73e8; }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 700; color: #202124; margin-bottom: 8px; line-height: 1.1; }
.kpi-comps { font-size: 12px; color: #80868b; }
.kpi-comps .pos { color: #137333; font-weight: 700; }
.kpi-comps .neg { color: #c5221f; font-weight: 700; }
.kpi-comps .neu { color: #80868b; }

.table-wrap { background: white; border-radius: 8px; overflow: auto; margin-bottom: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #f0f4f9; }
th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #80868b; text-transform: uppercase; white-space: nowrap; }
th.r, td.r { text-align: right; }
td { padding: 9px 14px; border-top: 1px solid #f0f4f9; }
tr:hover td { background: #f8f9fa; }
.cn { font-weight: 500; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
tfoot td { font-weight: 700; background: #f0f4f9; border-top: 2px solid #dadce0; }

.chart-wrap { background: white; border-radius: 8px; padding: 20px; margin-bottom: 4px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; }

.acc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .acc-grid { grid-template-columns: 1fr; } }
.acc-card { background: white; border-radius: 8px; padding: 16px; }
.acc-name { font-size: 13px; font-weight: 700; border-bottom: 3px solid #1a73e8; padding-bottom: 8px; margin-bottom: 12px; }
.acc-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.acc-metric .ml { font-size: 10px; color: #80868b; text-transform: uppercase; }
.acc-metric .mv { font-size: 17px; font-weight: 700; }

.no-data { text-align: center; padding: 20px; color: #80868b; }
.footer { text-align: center; padding: 24px; font-size: 12px; color: #80868b; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Brisbane Showgrounds &middot; Google Ads Dashboard</h1>
    <div class="sub" id="last-pull"></div>
  </div>
</header>

<div class="controls">
  <label>Date range</label>
  <select id="range-select" onchange="renderAll()">
    <option value="7d">Last 7 Days</option>
    <option value="30d" selected>Last 30 Days</option>
    <option value="mtd">Month to Date</option>
    <option value="lm">Last Month</option>
    <option value="3m">Last 3 Months</option>
  </select>
</div>

<main>
  <div class="section-label">Key Metrics</div>
  <div class="kpi-grid" id="kpi-grid"></div>

  <div class="section-label">Campaign Split</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Campaign</th>
          <th class="r">Spend</th>
          <th class="r">Conv</th>
          <th class="r">Revenue</th>
          <th class="r">ROAS</th>
          <th class="r">CPA</th>
          <th class="r">Clicks</th>
          <th class="r">Impr</th>
        </tr>
      </thead>
      <tbody id="camp-body"></tbody>
      <tfoot id="camp-foot"></tfoot>
    </table>
  </div>

  <div class="section-label">Monthly Trend &mdash; Last 12 Months</div>
  <div class="chart-wrap">
    <div class="chart-title">Spend &amp; Revenue</div>
    <canvas id="trend-chart" height="80"></canvas>
  </div>

  <div class="section-label">Account Split</div>
  <div class="acc-grid" id="acc-grid"></div>
</main>

<div class="footer">
  Brisbane Showgrounds &middot; Google Ads Dashboard &middot; Data updates daily at 5am AEST
</div>

<script>
// Data embedded server-side by doGet() in 6_Brisbane_WebApp.gs
var RAW  = <?= data ?>;
var data = { daily: RAW.daily, campaigns: RAW.campaigns, monthly: RAW.monthly };
var trendChart = null;

// ── Column index maps (0-based) ──────────────────────────────────────────────
var DM = {
  '7d':  { sp:4,  spP:5,  cv:24, rv:28, rvP:29, cl:44 },
  '30d': { sp:9,  spP:10, cv:25, rv:30, rvP:31, cl:45 },
  'mtd': { sp:14, spP:15, cv:26, rv:32, rvP:33, cl:46 },
  'lm':  { sp:19, spP:20, cv:27, rv:34, rvP:35, cl:47 },
  '3m':  { sp:52, spP:53, cv:57, rv:58, rvP:59, cl:62 }
};
var CM = {
  '7d':  { sp:4,  cv:8,  rv:12, cl:16, im:20 },
  '30d': { sp:5,  cv:9,  rv:13, cl:17, im:21 },
  'mtd': { sp:6,  cv:10, rv:14, cl:18, im:22 },
  'lm':  { sp:7,  cv:11, rv:15, cl:19, im:23 },
  '3m':  { sp:24, cv:25, rv:26, cl:27, im:28 }
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function n(v)   { return parseFloat(v) || 0; }
function aud(v) { return '$' + n(v).toLocaleString('en-AU', { maximumFractionDigits: 0 }); }
function int(v) { return n(v).toLocaleString('en-AU', { maximumFractionDigits: 0 }); }

function pctHtml(v) {
  var f = n(v);
  if (!f) return '<span class="neu">—</span>';
  var cls = f > 0 ? 'pos' : 'neg';
  return '<span class="' + cls + '">' + (f > 0 ? '+' : '') + (f * 100).toFixed(1) + '%</span>';
}

function latestRows(rows) {
  if (!rows || rows.length < 2) return [];
  var body = rows.slice(1);
  var mx = '';
  body.forEach(function(r) {
    var d = String(r[0] || '').substring(0, 10);
    if (d > mx) mx = d;
  });
  return body.filter(function(r) {
    return String(r[0] || '').substring(0, 10) === mx;
  });
}

// ── Render all ───────────────────────────────────────────────────────────────
function renderAll() {
  var range = document.getElementById('range-select').value;
  renderKPIs(range);
  renderCampaigns(range);
  renderChart();
  renderAccounts(range);
}

// ── KPI cards ────────────────────────────────────────────────────────────────
function renderKPIs(range) {
  var rows = latestRows(data.daily);
  var m    = DM[range];

  if (rows.length && rows[0][0]) {
    document.getElementById('last-pull').textContent =
      'Last pull: ' + String(rows[0][0]).substring(0, 10) + ' AEST';
  }

  var sp=0, spP=0, cv=0, rv=0, rvP=0, cl=0;
  rows.forEach(function(r) {
    sp  += n(r[m.sp]);
    spP += n(r[m.spP]);
    cv  += n(r[m.cv]);
    rv  += n(r[m.rv]);
    rvP += n(r[m.rvP]);
    cl  += n(r[m.cl]);
  });

  var spPop = spP > 0 ? (sp - spP) / spP : null;
  var rvPop = rvP > 0 ? (rv - rvP) / rvP : null;
  var roas  = sp  > 0 ? rv / sp : 0;
  var cpa   = cv  > 0 ? sp / cv : 0;

  var cards = [
    { l:'Spend',       v:aud(sp),              pop:spPop, c:'#0d47a1', bg:'#e3f2fd' },
    { l:'Conversions', v:int(cv),              pop:null,  c:'#1b5e20', bg:'#e8f5e9' },
    { l:'CPA',         v:aud(cpa),             pop:null,  c:'#880e4f', bg:'#fce4ec' },
    { l:'Revenue',     v:aud(rv),              pop:rvPop, c:'#0d47a1', bg:'#e3f2fd' },
    { l:'ROAS',        v:roas.toFixed(2) + 'x',pop:null, c:'#e65100', bg:'#fff3e0' },
    { l:'Clicks',      v:int(cl),              pop:null,  c:'#4a148c', bg:'#f3e5f5' }
  ];

  document.getElementById('kpi-grid').innerHTML = cards.map(function(c) {
    return '<div class="kpi-card" style="border-left-color:' + c.c + ';background:' + c.bg + '">' +
      '<div class="kpi-label" style="color:' + c.c + '">' + c.l + '</div>' +
      '<div class="kpi-value">' + c.v + '</div>' +
      '<div class="kpi-comps">' + (c.pop !== null ? 'PoP ' + pctHtml(c.pop) : '<span class="neu">—</span>') + '</div>' +
      '</div>';
  }).join('');
}

// ── Campaign table ────────────────────────────────────────────────────────────
function renderCampaigns(range) {
  var rows = latestRows(data.campaigns);
  var m    = CM[range];
  var by   = {};

  rows.forEach(function(r) {
    var nm = r[3] || '(unknown)';
    if (!by[nm]) by[nm] = { sp:0, cv:0, rv:0, cl:0, im:0 };
    by[nm].sp += n(r[m.sp]);
    by[nm].cv += n(r[m.cv]);
    by[nm].rv += n(r[m.rv]);
    by[nm].cl += n(r[m.cl]);
    by[nm].im += n(r[m.im]);
  });

  var sorted = Object.keys(by)
    .filter(function(k) { return by[k].sp > 0; })
    .sort(function(a, b) { return by[b].sp - by[a].sp; });

  if (!sorted.length) {
    document.getElementById('camp-body').innerHTML =
      '<tr><td colspan="8" class="no-data">No campaign data yet — run refreshCampaignData() first</td></tr>';
    document.getElementById('camp-foot').innerHTML = '';
    return;
  }

  var tsp=0, tcv=0, trv=0, tcl=0, tim=0;

  document.getElementById('camp-body').innerHTML = sorted.map(function(nm) {
    var d = by[nm];
    tsp += d.sp; tcv += d.cv; trv += d.rv; tcl += d.cl; tim += d.im;
    var r = d.sp > 0 ? d.rv / d.sp : 0;
    var c = d.cv > 0 ? d.sp / d.cv : 0;
    return '<tr>' +
      '<td class="cn" title="' + nm + '">' + nm + '</td>' +
      '<td class="r">' + aud(d.sp) + '</td>' +
      '<td class="r">' + int(d.cv) + '</td>' +
      '<td class="r">' + aud(d.rv) + '</td>' +
      '<td class="r">' + r.toFixed(2) + 'x</td>' +
      '<td class="r">' + (d.cv > 0 ? aud(c) : '—') + '</td>' +
      '<td class="r">' + int(d.cl) + '</td>' +
      '<td class="r">' + int(d.im) + '</td>' +
      '</tr>';
  }).join('');

  var tr = tsp > 0 ? trv / tsp : 0;
  var tc = tcv > 0 ? tsp / tcv : 0;
  document.getElementById('camp-foot').innerHTML =
    '<tr><td>TOTAL</td>' +
    '<td class="r">' + aud(tsp) + '</td>' +
    '<td class="r">' + int(tcv)  + '</td>' +
    '<td class="r">' + aud(trv)  + '</td>' +
    '<td class="r">' + tr.toFixed(2) + 'x</td>' +
    '<td class="r">' + (tcv > 0 ? aud(tc) : '—') + '</td>' +
    '<td class="r">' + int(tcl)  + '</td>' +
    '<td class="r">' + int(tim)  + '</td></tr>';
}

// ── Monthly trend chart ───────────────────────────────────────────────────────
function renderChart() {
  var rows = (data.monthly || []).slice(1);
  if (!rows.length) return;

  var labels = rows.map(function(r) { return String(r[0] || ''); });
  var spend  = rows.map(function(r) { return n(r[1]);  });
  var rev    = rows.map(function(r) { return n(r[16]); });

  if (trendChart) trendChart.destroy();

  trendChart = new Chart(document.getElementById('trend-chart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label:'Spend',   data:spend, borderColor:'#1a73e8', backgroundColor:'rgba(26,115,232,0.08)', borderWidth:2, pointRadius:4, tension:0.3, fill:true },
        { label:'Revenue', data:rev,   borderColor:'#34a853', backgroundColor:'rgba(52,168,83,0.08)',  borderWidth:2, pointRadius:4, tension:0.3, fill:true }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: function(ctx) { return ctx.dataset.label + ': ' + aud(ctx.parsed.y); }
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: function(v) { return '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v); }
          }
        }
      }
    }
  });
}

// ── Account split ─────────────────────────────────────────────────────────────
function renderAccounts(range) {
  var rows = latestRows(data.daily);
  var m    = DM[range];
  var ac   = {};

  rows.forEach(function(r) {
    var nm = r[1] || 'Unknown';
    if (!ac[nm]) ac[nm] = { sp:0, cv:0, rv:0, cl:0 };
    ac[nm].sp += n(r[m.sp]);
    ac[nm].cv += n(r[m.cv]);
    ac[nm].rv += n(r[m.rv]);
    ac[nm].cl += n(r[m.cl]);
  });

  document.getElementById('acc-grid').innerHTML = Object.keys(ac).map(function(nm) {
    var d    = ac[nm];
    var roas = d.sp > 0 ? d.rv / d.sp : 0;
    var cpa  = d.cv > 0 ? d.sp / d.cv : 0;
    return '<div class="acc-card">' +
      '<div class="acc-name">' + nm + '</div>' +
      '<div class="acc-metrics">' +
        '<div class="acc-metric"><div class="ml">Spend</div><div class="mv">'   + aud(d.sp)           + '</div></div>' +
        '<div class="acc-metric"><div class="ml">Conv</div><div class="mv">'    + int(d.cv)            + '</div></div>' +
        '<div class="acc-metric"><div class="ml">Revenue</div><div class="mv">' + aud(d.rv)           + '</div></div>' +
        '<div class="acc-metric"><div class="ml">ROAS</div><div class="mv">'    + roas.toFixed(2) + 'x</div></div>' +
        '<div class="acc-metric"><div class="ml">CPA</div><div class="mv">'     + (d.cv > 0 ? aud(cpa) : '—') + '</div></div>' +
        '<div class="acc-metric"><div class="ml">Clicks</div><div class="mv">'  + int(d.cl)           + '</div></div>' +
      '</div></div>';
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = function() { renderAll(); };
</script>
</body>
</html>
